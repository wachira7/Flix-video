# ============================================
# NETWORKS
# ============================================

networks:
  flixvideo-network:
    driver: bridge

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
